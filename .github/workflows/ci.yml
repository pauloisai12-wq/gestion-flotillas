name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — typecheck + prisma validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    # Variables dummy a nivel de job: env.ts (que se importa por tsc/build)
    # aborta el proceso si DATABASE_URL/JWT_SECRET no existen o son débiles.
    # En CI no nos conectamos a nada, solo necesitamos que el módulo cargue.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/dummy
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-dummy-secret-de-mas-de-32-caracteres-para-zod-validation
      NODE_ENV: test
      # Captcha apagado: refleja el despliegue interno (§6.1) y evita exigir secret.
      TURNSTILE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  web:
    name: Web — typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # En CI no hay backend, pero el build de Next no requiere API en runtime
          NEXT_PUBLIC_API_URL: http://localhost:3001
          # Captcha apagado en el build (refleja el despliegue interno, §6.1).
          NEXT_PUBLIC_TURNSTILE_ENABLED: "false"

  worker:
    name: Worker Python — import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: worker/requirements.txt

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Syntax check & imports
        run: |
          python -m py_compile main.py db.py generate_pdf.py generate_excel.py
