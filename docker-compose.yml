# /docker-compose.yml — modo PRODUCCIÓN por defecto
#
# Optimizado para pruebas de usabilidad con ngrok:
#   - Next.js servido como build minificado (no `next dev`)
#   - Compresión gzip habilitada en el API
#   - Cache headers en assets estáticos
#   - Imagen del web reducida via output: standalone (~200MB vs 1.5GB)
#   - SIN bind mounts de código (los containers usan el build, no tu disco)
#
# Para activar modo DEV (hot-reload), usa el override:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Para arrancar prod:
#   docker compose up -d --build

services:
  # === BASE DE DATOS ===
  postgres:
    image: postgres:16
    container_name: flotillas_postgres
    restart: unless-stopped
    ports:
      # Solo loopback del host (no exponer la BD a la red del host/internet).
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === CACHÉ Y BROKER DE COLAS ===
  redis:
    image: redis:7-alpine
    container_name: flotillas_redis
    restart: unless-stopped
    # SEGURIDAD: Redis exige contraseña (--requirepass). Sin esto, cualquier
    # proceso en la red Docker podría leer/escribir/inyectar jobs en las colas
    # BullMQ (incluida la cola 'reports' que ejecuta el worker Python).
    # REDIS_PASSWORD es OBLIGATORIO: el arranque falla si no está en .env.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD es obligatorio - definelo en .env}"]
    ports:
      # Solo loopback del host (no exponer Redis/colas a la red del host/internet).
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === BACKEND API (Node.js + Express + TypeScript — modo prod) ===
  api:
    build:
      context: ./api
      target: prod
      dockerfile: Dockerfile
    container_name: flotillas_api
    restart: unless-stopped
    ports:
      # Solo loopback del host: el acceso entra SIEMPRE por Caddy (TLS). Evita
      # exponer la API directa si se levanta el base sin el override que la
      # neutraliza con `ports: !reset []` (defensa ante footgun de exposición).
      - "127.0.0.1:3001:3001"
    environment:
      # Si DATABASE_URL/REDIS_URL no se definen explícitamente en .env, se derivan
      # de las credenciales de Postgres/Redis (mismo patrón que worker-python, abajo).
      # Así basta con definir POSTGRES_*/REDIS_PASSWORD; defínelas explícitas solo si
      # apuntas a una BD/Redis externos. La password va embebida (literal) en la URL.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      # NODE_ENV debe declararse EXPLÍCITAMENTE en .env (sin fallback silencioso).
      # ⚠ "development" relaja las validaciones de env.ts (JWT >= 64ch, Turnstile,
      # CORS sin localhost, bcrypt >= 12) Y BYPASEA el captcha del portal público
      # (verifyTurnstile en publicRouter). NO uses "development" sobre un túnel
      # ngrok PÚBLICO: para exponer a internet usa "production" (ver
      # docker-compose.staging.yml). El build sigue siendo minificado (node dist/).
      NODE_ENV: ${NODE_ENV:?Define NODE_ENV en .env (development=local/ngrok privado, production=staging/expuesto a internet)}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Cadena de proxies delante de la API (Caddy -> Next -> API = 2 saltos). Sin
      # esto, req.ip colapsa a la IP interna del proxy y se degradan rate-limit,
      # CSRF-por-IP y el remoteip de Turnstile. El .env siempre gana. (env.ts:36,
      # parseo en api/src/index.ts: '2' -> app.set('trust proxy', 2)).
      TRUST_PROXY: ${TRUST_PROXY:-2}
      SENTRY_DSN: ${SENTRY_DSN}
      # Debe coincidir con el directorio del worker y con el bind mount de abajo.
      REPORTS_DIR: /app/storage/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      # COMPARTIDO con worker-python: el worker genera los PDF/Excel en
      # /app/storage/reports y la API los sirve por GET /api/reports/:id/download/:type.
      # Sin esto la descarga responde 404 (el archivo no existe en el FS de la API).
      - ./storage/reports:/app/storage/reports

  # === FRONTEND WEB (Next.js — modo prod standalone) ===
  web:
    build:
      context: ./web
      target: prod
      dockerfile: Dockerfile
      args:
        # Permite que el túnel ngrok use rutas relativas (proxy via Next a la API)
        NEXT_PUBLIC_API_URL: ""
        # CRÍTICO: el rewrites de Next.js embebe esta URL en build time.
        # Dentro de Docker, "localhost" del web NO es el api — hay que apuntar
        # al hostname del servicio en la red de compose.
        API_PROXY_TARGET: http://api:3001
        # Site key de Turnstile (build-time). Debe emparejar con TURNSTILE_SECRET
        # del API. Vacío en dev = sin captcha en el portal.
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        # Interruptor del captcha (build-time). 'false' lo apaga en el portal
        # (despliegue interno VPN-only, §6.1). Debe coincidir con TURNSTILE_ENABLED
        # del API. Default 'true'.
        NEXT_PUBLIC_TURNSTILE_ENABLED: ${NEXT_PUBLIC_TURNSTILE_ENABLED:-true}
    container_name: flotillas_web
    restart: unless-stopped
    ports:
      # Solo loopback del host: el acceso entra SIEMPRE por Caddy (TLS).
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:3001
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # === WORKER PYTHON (Reportería) ===
  worker-python:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: flotillas_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage/reports:/app/storage/reports

# === VOLÚMENES PERSISTENTES ===
volumes:
  postgres_data:
  redis_data:
